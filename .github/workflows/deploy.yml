name: Deploy Bibliotheque PHP Native

on:
  push:
    branches:
      - develop

      - main

env:
  PROJECT_ID: mussif

  REGION: europe-west1

  REPOSITORY: php-native

  IMAGE_NAME: bibliotheque

  SERVICE_TEST: bibliotheque-test

  SERVICE_PROD: bibliotheque-prod

  CLOUD_SQL_INSTANCE: bibliotheque-db

  RUNTIME_SERVICE_ACCOUNT: bibliotheque-run@mussif.iam.gserviceaccount.com

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

      id-token: write

    steps:
      ###################################################
      # Checkout
      ###################################################

      - name: Checkout

        uses: actions/checkout@v4

      ###################################################
      # Google Authentication
      ###################################################

      - name: Auth Google Cloud

        uses: google-github-actions/auth@v2

        with:
          workload_identity_provider: projects/214896728646/locations/global/workloadIdentityPools/github-pool/providers/github-provider

          service_account: bibliotheque-ci@mussif.iam.gserviceaccount.com

      - name: Setup gcloud

        uses: google-github-actions/setup-gcloud@v2

      ###################################################
      # Docker Authentication
      ###################################################

      - name: Docker Auth

        run: |


          gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet

      ###################################################
      # Build Image
      ###################################################

      - name: Build Docker Image

        run: |


          IMAGE=europe-west1-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/${IMAGE_NAME}:${GITHUB_SHA}


          docker build -t $IMAGE .

      ###################################################
      # Push Image
      ###################################################

      - name: Push Docker Image

        run: |


          IMAGE=europe-west1-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/${IMAGE_NAME}:${GITHUB_SHA}


          docker push $IMAGE

      ###################################################
      # Environment Selection
      ###################################################

      - name: Environment

        id: env

        run: |


          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]

          then

            echo "service=${SERVICE_PROD}" >> $GITHUB_OUTPUT

            echo "environment=production" >> $GITHUB_OUTPUT


          else


            echo "service=${SERVICE_TEST}" >> $GITHUB_OUTPUT

            echo "environment=test" >> $GITHUB_OUTPUT


          fi

      ###################################################
      # Deploy Cloud Run
      ###################################################

      - name: Deploy Cloud Run

        run: |


          IMAGE=europe-west1-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/${IMAGE_NAME}:${GITHUB_SHA}



          gcloud run deploy ${{ steps.env.outputs.service }} \

            --image=$IMAGE \

            --region=${REGION} \

            --platform=managed \

            --allow-unauthenticated \

            --service-account=${RUNTIME_SERVICE_ACCOUNT} \

            --add-cloudsql-instances=${PROJECT_ID}:${REGION}:${CLOUD_SQL_INSTANCE} \

            --port=8080 \

            --memory=512Mi \

            --cpu=1 \

            --timeout=300 \

            --max-instances=10 \

            --set-env-vars=APP_ENV=${{ steps.env.outputs.environment }},DB_HOST=/cloudsql/${PROJECT_ID}:${REGION}:${CLOUD_SQL_INSTANCE},DB_NAME=gestion_biblio,DB_USER=gest,DB_PASS=,DB_CHARSET=utf8mb4,BASE_URL=/
